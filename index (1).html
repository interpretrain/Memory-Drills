/* ─── SPEECH ─── */
function useTestimonySpeech() {
  const synthRef = useRef(window.speechSynthesis);
  const [speaking, setSpeaking] = useState(false);
  const speak = useCallback((text, rate = 0.92) => {
    const synth = synthRef.current; synth.cancel();
    const utter = new SpeechSynthesisUtterance(text); utter.rate = rate; utter.pitch = 1.0;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.name.includes("Google") && v.lang.startsWith("en")) || voices.find(v => v.lang.startsWith("en"));
    if (preferred) utter.voice = preferred;
    utter.onstart = () => setSpeaking(true); utter.onend = () => setSpeaking(false); utter.onerror = () => setSpeaking(false);
    synth.speak(utter);
  }, []);
  const stop = useCallback(() => { synthRef.current.cancel(); setSpeaking(false); }, []);
  return { speak, stop, speaking };
}

    <div style={{ textAlign: "center", maxWidth: 480, margin: "0 auto", padding: "60px 20px" }}>
      <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: tier.color, marginBottom: 24, fontWeight: 600 }}>Level {level.id} · Listening</div>
      <div style={{ width: 120, height: 120, borderRadius: "50%", margin: "0 auto 32px", display: "flex", alignItems: "center", justifyContent: "center", background: speaking ? `${tier.color}20` : "rgba(245,230,200,0.04)", border: `2px solid ${speaking ? tier.color : "rgba(245,230,200,0.1)"}`, transition: "all 0.3s", animation: speaking ? "pulse 2s infinite" : "none" }}>
        <span style={{ fontSize: 40 }}>{speaking ? "🔊" : "🔇"}</span>
      </div>
      <style>{`@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }`}</style>
      <p style={{ color: "#8A8070", fontSize: 14, marginBottom: 24 }}>
        {speaking ? "Listen carefully... visualize the scene." : `Testimony complete. Listened ${listenCount} time${listenCount !== 1 ? "s" : ""}.`}
      </p>
      <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
        {!speaking && <>
          <button onClick={playTestimony} style={{ background: "rgba(245,230,200,0.06)", color: "#C4B89A", border: "1px solid rgba(245,230,200,0.15)", borderRadius: 8, padding: "12px 24px", fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>↻ Listen Again</button>
          <button onClick={() => setDrillPhase("quiz")} style={{ background: tier.color, color: "#1A1612", border: "none", borderRadius: 8, padding: "12px 28px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>Start Quiz →</button>
        </>}
        {speaking && <button onClick={stop} style={{ background: "rgba(200,80,80,0.15)", color: "#C75B5B", border: "1px solid rgba(200,80,80,0.3)", borderRadius: 8, padding: "12px 24px", fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>⏹ Stop</button>}
      </div>
    </div>
  );

  /* ─── QUIZ ─── */
  const cardBg = "rgba(245,230,200,0.03)";
  const cardBorder = "rgba(245,230,200,0.06)";
  const inputBg = "rgba(245,230,200,0.04)";
  const inputBorder = "rgba(245,230,200,0.1)";

  const renderQuiz = () => (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "32px 20px 80px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 32 }}>
        <div>
          <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: tier.color, fontWeight: 600 }}>Level {level.id} Quiz</div>
          <div style={{ fontSize: 13, color: "#7A7060", marginTop: 3 }}>{level.category}</div>
        </div>
        <button onClick={() => setDrillPhase("listen")} style={{ background: "rgba(245,230,200,0.06)", border: "none", color: "#8A8070", borderRadius: 6, padding: "6px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>← Back</button>
      </div>

      {/* 1. Free Recall */}
      <section style={{ background: cardBg, borderRadius: 12, border: `1px solid ${cardBorder}`, padding: "22px 20px", marginBottom: 20 }}>
        <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, color: "#F5E6C8", marginTop: 0, marginBottom: 6 }}>1. Free Recall</h3>
        <p style={{ fontSize: 13, color: "#8A8070", marginBottom: 14 }}>Write back as much of the testimony as you remember.</p>
        <textarea value={freeRecall} onChange={e => setFreeRecall(e.target.value)} placeholder="Type everything you remember..." rows={4}
          style={{ width: "100%", background: inputBg, border: `1.5px solid ${inputBorder}`, borderRadius: 10, padding: 14, color: "#E0D5C0", fontSize: 14, resize: "vertical", lineHeight: 1.6, boxSizing: "border-box", fontFamily: "'DM Sans', sans-serif" }} />
      </section>

      {/* 2. MC */}
      <section style={{ background: cardBg, borderRadius: 12, border: `1px solid ${cardBorder}`, padding: "22px 20px", marginBottom: 20 }}>
        <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, color: "#F5E6C8", marginTop: 0, marginBottom: 14 }}>2. Detail Check</h3>
        {level.quiz.multipleChoice.map((q, qi) => (
          <div key={qi} style={{ marginBottom: qi < level.quiz.multipleChoice.length - 1 ? 18 : 0 }}>
            <p style={{ color: "#C4B89A", fontSize: 14, marginBottom: 10, fontWeight: 500 }}>{q.q}</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {q.options.map((opt, oi) => {
                const sel = quizAnswers[`mc_${qi}`] === oi;
                return <button key={oi} onClick={() => setQuizAnswers(p => ({ ...p, [`mc_${qi}`]: oi }))}
                  style={{ background: sel ? `${tier.color}20` : inputBg, border: `1.5px solid ${sel ? tier.color : inputBorder}`, borderRadius: 8, padding: "10px 12px", color: sel ? "#F5E6C8" : "#8A8070", fontSize: 13, cursor: "pointer", textAlign: "left", transition: "all 0.15s", fontFamily: "'DM Sans', sans-serif", fontWeight: sel ? 600 : 400 }}>
                  <span style={{ color: tier.color, marginRight: 5, fontWeight: 700 }}>{String.fromCharCode(97 + oi)})</span> {opt}
                </button>;
              })}
            </div>
          </div>
        ))}
      </section>

      {/* 3. Fill */}
      <section style={{ background: cardBg, borderRadius: 12, border: `1px solid ${cardBorder}`, padding: "22px 20px", marginBottom: 20 }}>
        <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, color: "#F5E6C8", marginTop: 0, marginBottom: 10 }}>3. Fill in the Blanks</h3>
        <p style={{ color: "#C4B89A", fontSize: 14, lineHeight: 1.7, marginBottom: 14 }}>{level.quiz.fillBlanks.text}</p>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {level.quiz.fillBlanks.blanks.map((_, bi) => (
            <input key={bi} value={quizAnswers[`fb_${bi}`] || ""} onChange={e => setQuizAnswers(p => ({ ...p, [`fb_${bi}`]: e.target.value }))} placeholder={`Blank ${bi + 1}`}
              style={{ background: inputBg, border: `1.5px solid ${inputBorder}`, borderRadius: 6, padding: "8px 12px", color: "#F5E6C8", fontSize: 13, width: 120, fontFamily: "'DM Sans', sans-serif" }} />
          ))}
        </div>
      </section>

      {/* 4. Sequence */}
      <section style={{ background: cardBg, borderRadius: 12, border: `1px solid ${cardBorder}`, padding: "22px 20px", marginBottom: 20 }}>
        <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, color: "#F5E6C8", marginTop: 0, marginBottom: 6 }}>4. Sequence Ordering</h3>
        <p style={{ fontSize: 13, color: "#8A8070", marginBottom: 12 }}>Drag items into the correct chronological order.</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          {sequenceOrder.map((item, idx) => (
            <div key={item} draggable onDragStart={() => setDragIdx(idx)} onDragOver={e => e.preventDefault()} onDrop={() => { if (dragIdx !== null) { moveSeqItem(dragIdx, idx); setDragIdx(null); } }}
              style={{ background: dragIdx === idx ? `${tier.color}15` : inputBg, border: `1.5px solid ${dragIdx === idx ? tier.color : inputBorder}`, borderRadius: 8, padding: "11px 14px", cursor: "grab", display: "flex", alignItems: "center", gap: 10, transition: "all 0.15s" }}>
              <span style={{ color: tier.color, fontWeight: 800, fontSize: 13, minWidth: 20 }}>{idx + 1}</span>
              <span style={{ color: "#C4B89A", fontSize: 13 }}>{item}</span>
              <span style={{ marginLeft: "auto", color: "#5A5040", fontSize: 16 }}>⠿</span>
            </div>
          ))}
        </div>
      </section>

      {/* 5. Comprehension */}
      <section style={{ background: cardBg, borderRadius: 12, border: `1px solid ${cardBorder}`, padding: "22px 20px", marginBottom: 20 }}>
        <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, color: "#F5E6C8", marginTop: 0, marginBottom: 14 }}>5. Comprehension</h3>
        {level.quiz.comprehension.map((q, qi) => (
          <div key={qi}>
            <p style={{ color: "#C4B89A", fontSize: 14, marginBottom: 10, fontWeight: 500 }}>{q.q}</p>
            <textarea value={quizAnswers[`comp_${qi}`] || ""} onChange={e => setQuizAnswers(p => ({ ...p, [`comp_${qi}`]: e.target.value }))} placeholder="Your answer..." rows={2}
              style={{ width: "100%", background: inputBg, border: `1.5px solid ${inputBorder}`, borderRadius: 8, padding: 12, color: "#E0D5C0", fontSize: 13, resize: "vertical", boxSizing: "border-box", fontFamily: "'DM Sans', sans-serif" }} />
          </div>
        ))}
      </section>

      {/* Confidence */}
      <section style={{ background: cardBg, borderRadius: 12, border: `1px solid ${cardBorder}`, padding: "22px 20px", marginBottom: 28 }}>
        <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 16, color: "#F5E6C8", marginTop: 0, marginBottom: 12 }}>How confident are you in your recall?</h3>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 12, color: "#5A5040" }}>Low</span>
          <input type="range" min={1} max={10} value={confidence} onChange={e => setConfidence(Number(e.target.value))} style={{ flex: 1, accentColor: tier.color }} />
          <span style={{ fontSize: 12, color: "#5A5040" }}>High</span>
          <span style={{ color: tier.color, fontWeight: 800, fontSize: 20, minWidth: 30, textAlign: "center" }}>{confidence}</span>
        </div>
      </section>

      <button onClick={submitQuiz} style={{ width: "100%", background: tier.color, color: "#1A1612", border: "none", borderRadius: 10, padding: "16px 0", fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>Submit & Review</button>
    </div>
  );

  /* ─── REVIEW ─── */
  const renderReview = () => {
    const getMC = (qi, oi) => { const c = level.quiz.multipleChoice[qi].answer, s = quizAnswers[`mc_${qi}`]; if (oi === c) return "correct"; if (oi === s && s !== c) return "wrong"; return ""; };
    const getFB = bi => (quizAnswers[`fb_${bi}`] || "").toLowerCase().trim() === level.quiz.fillBlanks.blanks[bi].toLowerCase() ? "correct" : "wrong";
    const cSeq = level.quiz.sequence;
    const rc = { background: cardBg, borderRadius: 12, border: `1px solid ${cardBorder}`, padding: 20, marginBottom: 20 };
    const green = "#4A9B7F", red = "#C75B5B";

    return (
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "32px 20px 80px" }}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: tier.color, fontWeight: 600, marginBottom: 12 }}>Level {level.id} Complete</div>
          <div style={{ width: 136, height: 136, borderRadius: "50%", margin: "0 auto 20px", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", border: `3px solid ${tier.color}`, background: `${tier.color}10` }}>
            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 44, color: "#F5E6C8", fontWeight: 700, lineHeight: 1 }}>{quizScore}</div>
            <div style={{ fontSize: 13, color: "#9B8A6E" }}>percent</div>
          </div>
          <p style={{ fontSize: 14, color: "#8A8070" }}>Confidence: {confidence}/10 · Listens: {listenCount}</p>
        </div>

        {/* Transcript */}
        <section style={rc}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, color: "#F5E6C8", margin: 0 }}>Transcript</h3>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => speak(level.testimony)} style={{ background: "rgba(245,230,200,0.06)", border: "none", borderRadius: 6, padding: "6px 14px", color: "#C4B89A", fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>▶ Replay</button>
              <button onClick={() => setShowTranscript(!showTranscript)} style={{ background: "rgba(245,230,200,0.06)", border: "none", borderRadius: 6, padding: "6px 14px", color: "#C4B89A", fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>{showTranscript ? "Hide" : "Show"} Key Details</button>
            </div>
          </div>
          <p style={{ color: "#C4B89A", fontSize: 14, lineHeight: 1.85, margin: 0 }}>
            {showTranscript ? level.testimony.split(" ").map((w, i) => {
              const isK = level.keyDetails.some(kd => kd.toLowerCase().split(" ").some(kw => w.toLowerCase().replace(/[.,!?]/g, "") === kw));
              return <span key={i} style={{ background: isK ? `${tier.color}30` : "transparent", borderRadius: isK ? 3 : 0, padding: isK ? "2px 4px" : 0, color: isK ? "#F5E6C8" : undefined, fontWeight: isK ? 700 : undefined }}>{w} </span>;
            }) : level.testimony}
          </p>
        </section>

        {/* MC Review */}
        <section style={rc}>
          <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 16, color: "#F5E6C8", marginTop: 0, marginBottom: 14 }}>Detail Check</h3>
          {level.quiz.multipleChoice.map((q, qi) => (
            <div key={qi} style={{ marginBottom: 14 }}>
              <p style={{ color: "#C4B89A", fontSize: 13, fontWeight: 500, marginBottom: 8 }}>{q.q}</p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                {q.options.map((opt, oi) => {
                  const st = getMC(qi, oi);
                  return <div key={oi} style={{ padding: "8px 10px", borderRadius: 7, fontSize: 12, background: st === "correct" ? `${green}20` : st === "wrong" ? `${red}20` : "rgba(245,230,200,0.03)", border: `1px solid ${st === "correct" ? green + "40" : st === "wrong" ? red + "40" : "rgba(245,230,200,0.06)"}`, color: st === "correct" ? green : st === "wrong" ? red : "#7A7060", fontWeight: st ? 600 : 400 }}>
                    {st === "correct" ? "✓ " : st === "wrong" ? "✗ " : ""}{opt}
                  </div>;
                })}
              </div>
            </div>
          ))}
        </section>

        {/* FB Review */}
        <section style={rc}>
          <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 16, color: "#F5E6C8", marginTop: 0, marginBottom: 14 }}>Fill in the Blanks</h3>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {level.quiz.fillBlanks.blanks.map((blank, bi) => {
              const st = getFB(bi);
              return <div key={bi} style={{ padding: "8px 14px", borderRadius: 7, fontSize: 13, background: st === "correct" ? `${green}20` : `${red}20`, border: `1px solid ${st === "correct" ? green + "40" : red + "40"}`, color: st === "correct" ? green : red, fontWeight: 600 }}>
                {st === "correct" ? "✓" : "✗"} {quizAnswers[`fb_${bi}`] || "(empty)"} → <strong>{blank}</strong>
              </div>;
            })}
          </div>
        </section>

        {/* Seq Review */}
        <section style={rc}>
          <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 16, color: "#F5E6C8", marginTop: 0, marginBottom: 14 }}>Correct Sequence</h3>
          {cSeq.map((item, i) => {
            const ok = sequenceOrder[i] === item;
            return <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", marginBottom: 4, borderRadius: 7, background: ok ? `${green}10` : `${red}10`, border: `1px solid ${ok ? green + "20" : red + "20"}` }}>
              <span style={{ color: ok ? green : red, fontWeight: 800, fontSize: 12, minWidth: 20 }}>{i + 1}</span>
              <span style={{ color: "#C4B89A", fontSize: 13 }}>{item}</span>
              <span style={{ marginLeft: "auto", fontSize: 13, color: ok ? green : red }}>{ok ? "✓" : "✗"}</span>
            </div>;
          })}
        </section>

        {/* Comp Review */}
        <section style={rc}>
          <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 16, color: "#F5E6C8", marginTop: 0, marginBottom: 14 }}>Comprehension</h3>
          {level.quiz.comprehension.map((q, qi) => (
            <div key={qi}>
              <p style={{ color: "#9B8A6E", fontSize: 12, marginBottom: 4, fontWeight: 500 }}>{q.q}</p>
              <p style={{ color: "#8A8070", fontSize: 12, marginBottom: 4 }}>Your answer: <span style={{ color: "#C4B89A" }}>{quizAnswers[`comp_${qi}`] || "(none)"}</span></p>
              <p style={{ color: green, fontSize: 13, fontWeight: 600, margin: 0 }}>Model: {q.answer}</p>
            </div>
          ))}
        </section>

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => startDrill(level.id)} style={{ flex: 1, background: "rgba(245,230,200,0.06)", color: "#C4B89A", border: "1px solid rgba(245,230,200,0.12)", borderRadius: 10, padding: "14px 0", fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontWeight: 600 }}>↻ Retry</button>
          <button onClick={goHome} style={{ flex: 1, background: tier.color, color: "#1A1612", border: "none", borderRadius: 10, padding: "14px 0", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>Dashboard</button>
          {level.id < 25 && <button onClick={() => startDrill(level.id + 1)} style={{ flex: 1, background: "transparent", color: tier.color, border: `2px solid ${tier.color}`, borderRadius: 10, padding: "14px 0", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>Next →</button>}
        </div>
      </div>
    );
  };

  return (
    <div style={{ minHeight: "100vh", background: "#1A1612", color: "#F5E6C8", fontFamily: "'DM Sans', sans-serif" }}>
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0, background: "radial-gradient(ellipse at 20% 0%, rgba(196,135,59,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(74,155,127,0.03) 0%, transparent 60%)" }} />

      {/* Nav */}
      <div style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(26,22,18,0.92)", backdropFilter: "blur(12px)", borderBottom: "1px solid rgba(245,230,200,0.06)", padding: "10px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={goHome} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
          <img src="https://interpretrain.com/cdn/shop/files/logo_180x.jpg?v=1613164057" alt="InterpreTrain" style={{ height: 34, borderRadius: 8 }} />
          <span style={{ fontSize: 11, letterSpacing: 2.5, textTransform: "uppercase", color: "#9B8A6E", fontWeight: 600 }}>Memory Mastery</span>
        </button>
        {currentLevel && view === "drill" && <div style={{ fontSize: 12, color: "#7A7060" }}>Level {currentLevel} · {drillPhase}</div>}
      </div>

      <div style={{ position: "relative", zIndex: 1 }}>
        {view === "dashboard" && renderDashboard()}
        {view === "drill" && drillPhase === "tip" && renderTipPhase()}
        {view === "drill" && drillPhase === "visualize" && renderVisualize()}
        {view === "drill" && drillPhase === "listen" && renderListen()}
        {view === "drill" && drillPhase === "quiz" && renderQuiz()}
        {view === "drill" && drillPhase === "review" && renderReview()}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
